<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Convert between Celsius, Fahrenheit, Kelvin"><title>Temperature Converter — DevKit Tools</title><style>

</head><body><div class="card"><h1>🌡️ Temperature</h1>
<input type="number" id="val" value="25" oninput="conv()">
<select id="from" onchange="conv()"><option value="C">Celsius</option><option value="F" selected>Fahrenheit</option><option value="K">Kelvin</option></select>
<div class="results"><div class="r"><div class="val" id="c">-</div><div class="unit">Celsius</div></div><div class="r"><div class="val" id="f">-</div><div class="unit">Fahrenheit</div></div><div class="r"><div class="val" id="k">-</div><div class="unit">Kelvin</div></div></div></div>
<script>
'use strict';
function conv(){const v=parseFloat(document.getElementById('val').value)||0;const f=document.getElementById('from').value;let c;if(f==='C')c=v;else if(f==='F')c=(v-32)*5/9;else c=v-273.15;document.getElementById('c').textContent=c.toFixed(2);document.getElementById('f').textContent=((c*9/5)+32).toFixed(2);document.getElementById('k').textContent=(c+273.15).toFixed(2)}conv();
</script></body></html>
